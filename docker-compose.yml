services:
  kdhome:
    build: .
    ports:
      - "8888:8080"
    container_name: kunaldawn-homepage
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - web
    # All supported env vars. Values use ${VAR:-default} interpolation, so you
    # can override any of them from the shell or a `.env` file in this directory
    # (do NOT commit real secrets — keep AUTH_SECRET / GOOGLE_* in `.env`).
    environment:
      # ─── Server ───
      # Port the app listens on INSIDE the container. Keep it 8080 to match the
      # right-hand side of the `ports` mapping above (host 8888 -> container 8080).
      - PORT=${PORT:-8080}
      # Directory for the SQLite DB and probe history; matches the mounted volume.
      - DATA_DIR=${DATA_DIR:-/app/data}

      # ─── Maintenance mode (optional, off by default) ───
      # Truthy (1/true/on/yes) serves a themed 503 "under maintenance" page for
      # every request (takes precedence over auth).
      - MAINTENANCE_MODE=${MAINTENANCE_MODE:-off}
      # RFC3339 end time driving the countdown, e.g. 2026-07-01T15:00:00Z. Empty = no countdown.
      - MAINTENANCE_END=${MAINTENANCE_END:-}
      # Custom message shown under the heading. Empty = "We'll be back soon."
      - MAINTENANCE_MESSAGE=${MAINTENANCE_MESSAGE:-}

      # ─── Google auth (optional, off by default) ───
      # Truthy enables Google sign-in and gates the whole site (except crawler/PWA
      # files). When on, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET and AUTH_SECRET are
      # REQUIRED or the server refuses to start (fail-closed).
      - AUTH_ENABLED=${AUTH_ENABLED:-off}
      # Google OAuth Web client credentials.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # HMAC secret for the session cookie. Use a long random value and the SAME
      # value on every subdomain that verifies the cookie locally.
      - AUTH_SECRET=${AUTH_SECRET:-}
      # Public base URL; builds the OAuth callback {BASE}/auth/google/callback.
      - AUTH_BASE_URL=${AUTH_BASE_URL:-https://kunaldawn.com}
      # Session cookie domain (leading dot OK); sent to the apex + all subdomains.
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-.kunaldawn.com}
      # Session cookie name.
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-kd_session}
      # Session lifetime as a Go duration (e.g. 720h, 168h, 24h).
      - AUTH_SESSION_TTL=${AUTH_SESSION_TTL:-720h}
      # Super admin email. When set (and auth enabled), this user sees the Admin
      # entry in the start menu and can open /admin (user registry).
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}

      # ─── Anonymous guest login (optional, off by default) ───
      # Truthy adds an "Enter as guest" button beside Google sign-in. Requires
      # AUTH_ENABLED. Mints a short-lived, identity-free session after the
      # browser solves an IP-bound proof-of-work (bot protection).
      - AUTH_ANON_ENABLED=${AUTH_ANON_ENABLED:-off}
      # Anonymous session lifetime (Go duration). Short by design.
      - AUTH_ANON_TTL=${AUTH_ANON_TTL:-30m}
      # PoW difficulty. Set it ONE of two ways (leave the others empty):
      #  A) Directly, in leading-zero bits — base (clean IP) and adaptive ceiling.
      #     Each +1 bit ≈ doubles the work. Empty -> code defaults (~10s target
      #     @ 50000 H/s -> 19 bits base, 23 ceil).
      - AUTH_ANON_POW_BITS=${AUTH_ANON_POW_BITS:-}
      - AUTH_ANON_POW_CEIL=${AUTH_ANON_POW_CEIL:-}
      #  B) By TARGET solve time in milliseconds. The server converts it to bits
      #     using AUTH_ANON_POW_HASHRATE (assumed hashes/sec of a reference
      #     browser's WebCrypto SHA-256 in a Worker). PoW is verified by work,
      #     not wall-clock, so this is exact only on the reference device —
      #     measure and tune the hashrate (startup log prints the derived bits).
      #     Explicit AUTH_ANON_POW_BITS wins over this. Example: ~10s target:
      #       AUTH_ANON_POW_MS=10000  (with the default 50000 H/s -> ~19 bits)
      - AUTH_ANON_POW_MS=${AUTH_ANON_POW_MS:-}
      - AUTH_ANON_POW_HASHRATE=${AUTH_ANON_POW_HASHRATE:-50000}

networks:
  web:
    driver: bridge
